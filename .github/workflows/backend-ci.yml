name: Backend CI

on:
  push:
    branches: [main, "Dev/**"]
    paths:
      - "sports4u-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, "Dev/**"]
    paths:
      - "sports4u-backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sports4u_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run Tests with Maven
        run: mvn -B clean verify
        working-directory: sports4u-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: sports4u_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgrespassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USERNAME: guest
          RABBITMQ_PASSWORD: guest
          MAIL_USERNAME: dummy@gmail.com
          MAIL_PASSWORD: dummypassword
          GEMINI_KEY: dummy_gemini_key
          VNPAY_TMN_CODE: dummy_vnpay_tmn_code
          VNPAY_HASH_SECRET: dummy_vnpay_hash_secret
          VNPAY_RETURN_URL: http://localhost:8080/api/user/order/payment/vnpay-return

      - name: Publish Test Report
        uses: scacap/action-surefire-report@v1
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          report_paths: "sports4u-backend/target/surefire-reports/TEST-*.xml"
