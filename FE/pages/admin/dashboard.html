<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/layout.css">
    <title>Sports4U - Admin Dashboard</title>
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <aside class="col-lg-2 col-md-3 bg-dark text-white min-vh-100 p-3">
                <h5 class="fw-bold mb-4">ADMIN</h5>

                <ul class="nav flex-column gap-1">
                    <li>
                        <a class="nav-link text-white active" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>

                    <li class="mt-3 fw-bold small">Quản lý</li>

                    <li>
                        <a class="nav-link text-white" href="users.html">
                            <i class="bi bi-people me-2"></i> Tài khoản
                        </a>
                    </li>

                    <li>
                        <a class="nav-link text-white" data-bs-toggle="collapse" href="#sportMenu">
                            <i class="bi bi-tags me-2"></i> Môn thể thao
                        </a>

                        <div class="collapse show ps-3" id="sportMenu">
                            <a class="nav-link text-white-50" href="products.html?category=pickleball">Pickleball</a>
                            <a class="nav-link text-white-50" href="products.html?category=football">Football</a>
                            <a class="nav-link text-white-50" href="products.html?category=basketball">Basketball</a>
                        </div>
                    </li>

                    <li>
                        <a class="nav-link text-white" href="orders.html">
                            <i class="bi bi-receipt me-2"></i> Đơn hàng
                        </a>
                    </li>
                </ul>
            </aside>

            <!-- CONTENT -->
            <main class="col-lg-10 col-md-9 p-4">
                <h3 class="mb-4">Trang quản trị</h3>

                <div class="row g-4">
                    <div class="col-md-3">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <p class="text-muted mb-1">Tài khoản</p>
                                <h3>120</h3>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <p class="text-muted mb-1">Sản phẩm</p>
                                <h3>86</h3>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <p class="text-muted mb-1">Đơn hàng</p>
                                <h3>42</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
