<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/layout.css">
    <title>Sports4U - Home</title>
</head>

<body>
    <header class="border-bottom bg-white sticky-top shadow-sm">
        <div class="container">
            <div class="row align-items-center py-3">
                <!-- Logo -->
                <div class="col-lg-2 col-md-3 col-4">
                    <a class="navbar-brand fw-bold text-dark text-decoration-none" href="index.html">
                        SPORTS4U
                    </a>
                </div>

                <!-- Search bar -->
                <div class="col-lg-6 col-md-5 col-4">
                    <div class="input-group input-group-sm">
                        <input type="text" id="searchInput" class="form-control"
                            placeholder="Tìm kiếm sản phẩm..."
                            onkeydown="if(event.key==='Enter') doSearch()">
                        <button class="btn btn-dark" onclick="doSearch()">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </div>

                <!-- Actions -->
                <div class="col-lg-4 col-md-4 col-4">
                    <div class="d-flex align-items-center justify-content-end gap-2">
                        <a href="./pages/cart.html" class="btn btn-outline-dark btn-sm position-relative">
                            <i class="bi bi-cart"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                                0
                            </span>
                        </a>

                        <div class="dropdown">
                            <button class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                <i class="bi bi-person"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li>
                                    <a class="dropdown-item" href="./pages/profile.html">
                                        <i class="bi bi-person-circle me-2"></i>
                                        Thông tin cá nhân
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item" href="./pages/orders.html">
                                        <i class="bi bi-receipt me-2"></i>
                                        Đơn hàng của tôi
                                    </a>
                                </li>
                            </ul>
                        </div>

                        <div id="auth-buttons" class="d-flex gap-2">
                            <a href="./pages/login.html" class="btn btn-outline-secondary btn-sm d-none d-sm-inline-block">
                                Đăng nhập
                            </a>
                            <a href="./pages/register.html" class="btn btn-dark btn-sm d-none d-sm-inline-block">
                                Đăng ký
                            </a>
                        </div>
                        <button id="logoutBtn" class="btn btn-outline-danger btn-sm d-none">
                            Đăng xuất
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container-fluid p-0">
        <img src="assets/banner-img.png" class="img-fluid w-100" alt="Banner">
    </div>

    <main class="container my-5">
        <div class="row">

            <!-- Sidebar danh mục -->
            <div class="col-lg-2 col-md-3 d-none d-md-block">
                <h6 class="fw-bold mb-3 text-uppercase" style="font-size:12px; letter-spacing:1px">Danh mục</h6>
                <div id="category-sidebar" class="d-flex flex-column gap-1">
                    <div class="text-muted small">Đang tải...</div>
                </div>
            </div>

            <!-- Nội dung chính -->
            <div class="col-lg-10 col-md-9 col-12" id="main-content">
                <!-- Products sẽ render ở đây -->
            </div>

        </div>
    </main>

    <footer class="border-top">
        <div class="container">
            <div class="row py-4">
                <div class="col-md-3">
                    <h5>Về chúng tôi</h5>
                    <p>Sports4U là nền tảng mua sắm thể thao hàng đầu</p>
                </div>
                <div class="col-md-3">
                    <h5>Hỗ trợ</h5>
                    <ul class="nav flex-column gap-2">
                        <li><a href="#" class="nav-link text-dark">Liên hệ</a></li>
                        <li><a href="#" class="nav-link text-dark">FAQ</a></li>
                    </ul>
                </div>
                <div class="col-md-3">
                    <h5>Chính sách</h5>
                    <ul class="nav flex-column gap-2">
                        <li><a href="#" class="nav-link text-dark">Điều khoản</a></li>
                        <li><a href="#" class="nav-link text-dark">Bảo mật</a></li>
                    </ul>
                </div>
                <div class="col-md-3">
                    <h5>Liên kết</h5>
                    <div class="d-flex gap-3">
                        <a href="#" class="text-dark"><i class="bi bi-facebook fs-5"></i></a>
                        <a href="#" class="text-dark"><i class="bi bi-instagram fs-5"></i></a>
                        <a href="#" class="text-dark"><i class="bi bi-twitter fs-5"></i></a>
                    </div>
                </div>
            </div>
            <div class="row border-top pt-3">
                <div class="col-12 text-center text-muted small">
                    <p>&copy; 2026 Sports4U. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/pages/home.js"></script>
        <script src="js/utils/header.js"></script>
</body>

</html>
