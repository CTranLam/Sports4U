<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-secondary bg-opacity-10">

    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="bg-white p-4 rounded shadow-sm" style="width: 320px;">

            <h6 class="text-muted mb-3">Quên mật khẩu</h6>

            <p class="small text-muted mb-3">
                Nhập email đã đăng ký để đặt lại mật khẩu.
            </p>

            <form id="forgotForm">
                <div class="mb-3">
                    <label class="form-label small">Email</label>
                    <input type="email"
                           class="form-control"
                           placeholder="Nhập email của bạn"
                           id="email"
                           required>
                </div>

                <button type="submit" class="btn btn-dark w-100 mb-3">
                    Gửi gửi mã xác nhận
                </button>

                <div class="text-center">
                    <a href="login.html" class="small text-decoration-none">
                        Quay lại đăng nhập
                    </a>
                </div>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/pages/forgot.js"></script>
</body>
</html>
