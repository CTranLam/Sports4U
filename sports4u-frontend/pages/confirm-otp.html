<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận mã OTP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-secondary bg-opacity-10">

    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="bg-white p-4 rounded shadow-sm" style="width: 320px;">

            <h6 class="text-muted mb-3">Xác nhận mã OTP</h6>

            <p class="small text-muted mb-3">
                Nhập mã xác nhận đã được gửi về email của bạn.
            </p>

            <form id="otpForm">

                <div class="mb-3">
                    <label class="form-label small">Mã OTP</label>
                    <input type="text"
                           class="form-control text-center"
                           placeholder="Nhập mã 6 chữ số"
                           id="otp"
                           maxlength="6"
                           required>
                </div>

                <button type="submit" class="btn btn-dark w-100 mb-3">
                    Xác nhận
                </button>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/pages/otp.js"></script>
</body>
</html>
