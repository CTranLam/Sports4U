<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-secondary bg-opacity-10">

    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="bg-white p-4 rounded shadow-sm" style="width: 320px;">

            <h6 class="text-muted mb-3">Đăng nhập</h6>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small">Email</label>
                    <input type="email"
                           class="form-control"
                           placeholder="Nhập email của bạn"
                           id="email">
                </div>

                <div class="mb-3">
                    <label class="form-label small">Mật khẩu</label>
                    <input type="password"
                           class="form-control"
                           placeholder="Nhập mật khẩu của bạn"
                           id="password">
                </div>

                <button type="submit" class="btn btn-dark w-100 mb-3">
                    Đăng nhập
                </button>

                <div class="text-center">
                    <a href="./forgot.html" class="d-block small text-decoration-none mb-1">
                        Quên mật khẩu?
                    </a>
                    <a href="register.html" class="small text-decoration-none">
                        Chưa có tài khoản? Đăng ký
                    </a>
                </div>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/pages/login.js"></script>
</body>
</html>
