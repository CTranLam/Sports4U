<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-secondary bg-opacity-10">

    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="bg-white p-4 rounded shadow-sm" style="width: 320px;">

            <h6 class="text-muted mb-3">Đặt lại mật khẩu</h6>

            <p class="small text-muted mb-3">
                Nhập mật khẩu mới cho tài khoản của bạn.
            </p>

            <form id="resetForm">

                <div class="mb-3">
                    <label class="form-label small">Mật khẩu mới</label>
                    <input type="password"
                           class="form-control"
                           id="password"
                           placeholder="Nhập mật khẩu mới"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label small">Xác nhận mật khẩu</label>
                    <input type="password"
                           class="form-control"
                           id="confirmPassword"
                           placeholder="Nhập lại mật khẩu"
                           required>
                </div>

                <button type="submit" class="btn btn-dark w-100 mb-2">
                    Đặt lại mật khẩu
                </button>

                <div class="text-center">
                    <a href="login.html" class="small text-decoration-none">
                        Quay lại đăng nhập
                    </a>
                </div>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/pages/reset-password.js"></script>
</body>
</html>
