<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Sports4U - Admin Dashboard</title>
    <style>
        .icon-chevron {
            transition: transform 0.2s ease;
            display: inline-block;
        }
        .icon-chevron.open {
            transform: rotate(90deg);
        }
    </style>
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row">

            <aside class="col-lg-2 col-md-3 bg-dark text-white min-vh-100 p-3">
                <h5 class="fw-bold mb-4">ADMIN</h5>
                <ul class="nav flex-column gap-1">
                    <li>
                        <a class="nav-link text-white" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="mt-3 fw-bold small">Quản lý</li>
                    <li>
                        <a class="nav-link text-white" href="users.html">
                            <i class="bi bi-people me-2"></i> Tài khoản
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white active" href="product-category.html">
                            <i class="bi bi-tags me-2"></i> Sản phẩm
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white" href="orders.html">
                            <i class="bi bi-receipt me-2"></i> Đơn hàng
                        </a>
                    </li>
                </ul>
                <hr class="bg-white my-4">
                <button id="logoutBtn" class="btn btn-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
                </button>
            </aside>

            <main class="col-lg-10 p-4">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Danh mục sản phẩm</h4>
                    <div class="d-flex gap-2">
                        <button class="btn btn-dark btn-sm" id="addProductFromCategoryBtn">
                            <i class="bi bi-box-seam me-1"></i> Thêm sản phẩm
                        </button>
                        <button class="btn btn-primary btn-sm" id="addCategoryBtn">
                            <i class="bi bi-plus-lg me-1"></i> Thêm danh mục
                        </button>
                    </div>
                </div>

                <!-- Search danh mục con -->
                <div class="position-relative mb-3" style="max-width: 520px;">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="categorySearchInput" class="form-control border-start-0"
                            placeholder="Tìm danh mục con" autocomplete="off">
                    </div>
                    <ul id="categorySearchSuggestions"
                        class="list-group shadow position-absolute w-100 d-none"
                        style="z-index:1000; top:100%; left:0; max-height:220px; overflow-y:auto;">
                    </ul>
                </div>

                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Tên danh mục</th>
                            <th class="text-center">Số lượng sản phẩm</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="categoryTableBody">
                        <tr>
                            <td colspan="4" class="text-center text-muted py-4">Đang tải...</td>
                        </tr>
                    </tbody>
                </table>

                <div class="d-flex justify-content-center mt-3 gap-1" id="paginationContainer"></div>

            </main>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div class="modal fade" id="addCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm danh mục sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addCategoryForm">
                        <div class="mb-3">
                            <label class="form-label">Danh mục cha (Tùy chọn)</label>
                            <select class="form-select" id="parentCategorySelect">
                                <option value="">-- Không chọn (Thêm danh mục chính) --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tên danh mục</label>
                            <input type="text" class="form-control" id="categoryName" placeholder="Nhập tên danh mục" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" id="saveCategoryBtn">Lưu danh mục</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal fade" id="addProductFromCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Danh mục <span class="text-danger">*</span></label>
                        <select class="form-select" id="productCategorySelect">
                            <option value="">-- Chọn danh mục con --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="newProductName" placeholder="Nhập tên sản phẩm">
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label">Giá (VND) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="newProductPrice" placeholder="Nhập giá">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Số lượng <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="newProductQuantity" placeholder="Nhập số lượng">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Xuất xứ</label>
                        <input type="text" class="form-control" id="newProductOrigin" placeholder="Nhập xuất xứ">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ưu điểm</label>
                        <input type="text" class="form-control" id="newProductAdvantages" placeholder="Nhập ưu điểm">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hình ảnh <span class="text-danger">*</span></label>
                        <input type="file" class="form-control" id="newProductImage" accept="image/*">
                        <img id="newProductImagePreview" src="" class="img-fluid mt-2 rounded d-none" style="max-height:150px;">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-dark" id="saveProductFromCategoryBtn">Lưu sản phẩm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal fade" id="deleteCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Xác nhận xóa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Bạn có chắc muốn xóa danh mục <strong id="deleteCategoryName"></strong> không?</p>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Xóa</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/utils/admin-common.js"></script>
    <script src="../../js/pages/admin-category.js"></script>
</body>

</html>
