<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/layout.css">
    <title>Sports4U - Admin Dashboard</title>
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <aside class="col-lg-2 col-md-3 bg-dark text-white min-vh-100 p-3">
                <h5 class="fw-bold mb-4">ADMIN</h5>

                <ul class="nav flex-column gap-1">
                    <li>
                        <a class="nav-link text-white" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>

                    <li class="mt-3 fw-bold small">Quản lý</li>

                    <li>
                        <a class="nav-link text-white" href="users.html">
                            <i class="bi bi-people me-2"></i> Tài khoản
                        </a>
                    </li>

                    <li>
                        <a class="nav-link text-white active" data-bs-toggle="collapse" href="#sportMenu">
                            <i class="bi bi-tags me-2"></i> Sản phẩm
                        </a>

                        <div class="collapse show ps-3" id="sportMenu">
                            <a class="nav-link text-white-50" href="product-category.html">Danh mục sản phẩm</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=pickleball">Pickleball</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=badminton">Badminton</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=basketball">Basketball</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=tennis">Tennis</a>
                        </div>
                    </li>

                    <li>
                        <a class="nav-link text-white" href="orders.html">
                            <i class="bi bi-receipt me-2"></i> Đơn hàng
                        </a>
                    </li>
                </ul>

                <!-- LOGOUT BUTTON -->
                <hr class="bg-white my-4">
                <button id="logoutBtn" class="btn btn-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
                </button>
            </aside>
            
            <main class="col-lg-10 p-4">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Danh mục sản phẩm</h4>
                    <button class="btn btn-primary btn-sm" id="addCategoryBtn">
                        <i class="bi bi-plus-lg me-1"></i> Thêm danh mục
                    </button>
                </div>

                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Tên danh mục</th>
                            <th class="text-center">Số lượng sản phẩm</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr style="cursor: pointer;" onclick="window.location.href='product-list.html?category=pickleball'">
                            <td>1</td>
                            <td>
                                <div class="fw-semibold">Pickleball</div>
                            </td>
                            <td class="text-center">
                                12
                            </td>
                            <td class="text-end">
                                <a href="product-list.html?category=pickleball" class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation()">
                                    <i class="bi bi-eye me-2"></i>Xem
                                </a>
                            </td>
                        </tr>

                        <tr style="cursor: pointer;" onclick="window.location.href='product-list.html?category=badminton'">
                            <td>2</td>
                            <td>
                                <div class="fw-semibold">Badminton</div>
                            </td>
                            <td class="text-center">
                                8
                            </td>
                            <td class="text-end">
                                <a href="product-list.html?category=badminton" class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation()">
                                    <i class="bi bi-eye me-2"></i>Xem
                                </a>
                            </td>
                        </tr>

                        <tr style="cursor: pointer;" onclick="window.location.href='product-list.html?category=basketball'">
                            <td>3</td>
                            <td>
                                <div class="fw-semibold">Basketball</div>
                            </td>
                            <td class="text-center">
                                6
                            </td>
                            <td class="text-end">
                                <a href="product-list.html?category=basketball" class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation()">
                                    <i class="bi bi-eye me-2"></i>Xem
                                </a>
                            </td>
                        </tr>

                        <tr style="cursor: pointer;" onclick="window.location.href='product-list.html?category=tennis'">
                            <td>4</td>
                            <td>
                                <div class="fw-semibold">Tennis</div>
                            </td>
                            <td class="text-center">
                                5
                            </td>
                            <td class="text-end">
                                <a href="product-list.html?category=tennis" class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation()">
                                    <i class="bi bi-eye me-2"></i>Xem
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- PAGINATION -->
                <div class="d-flex justify-content-center mt-3 gap-1" id="paginationContainer">
                </div>

            </main>

        </div>
    </div>

    <!-- Modal thêm danh mục -->
    <div class="modal fade" id="addCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm danh mục sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addCategoryForm">
                        <div class="mb-3">
                            <label class="form-label">Tên danh mục</label>
                            <input type="text" class="form-control" id="categoryName" placeholder="Nhập tên danh mục" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" id="saveCategoryBtn">Lưu danh mục</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/utils/admin-common.js"></script>
    <script type="module" src="../../js/pages/admin-category.js"></script>
</body>

</html>
