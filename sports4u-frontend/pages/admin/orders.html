<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Sports4U - Admin Đơn hàng</title>
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row">

            <aside class="col-lg-2 col-md-3 bg-dark text-white min-vh-100 p-3">
                <h5 class="fw-bold mb-4">ADMIN</h5>
                <ul class="nav flex-column gap-1">
                    <li>
                        <a class="nav-link text-white" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="mt-3 fw-bold small">Quản lý</li>
                    <li>
                        <a class="nav-link text-white" href="users.html">
                            <i class="bi bi-people me-2"></i> Tài khoản
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white" href="product-category.html">
                            <i class="bi bi-tags me-2"></i> Danh mục sản phẩm
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white" href="all-products.html">
                            <i class="bi bi-box-seam me-2"></i> Tất cả sản phẩm
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white active" href="orders.html">
                            <i class="bi bi-receipt me-2"></i> Đơn hàng
                        </a>
                    </li>
                </ul>
                <hr class="bg-white my-4">
                <button id="logoutBtn" class="btn btn-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
                </button>
            </aside>

            <main class="col-lg-10 p-4">
                <div class="mb-4">
                    <h4 class="fw-semibold mb-1">Quản lý đơn hàng</h4>
                    <p class="text-muted small mb-0">Theo dõi và cập nhật trạng thái đơn hàng</p>
                </div>

                <!-- Filters -->
                <div class="d-flex gap-2 mb-3 flex-wrap">
                    <select class="form-select form-select-sm w-auto" id="statusFilter">
                        <option value="">Tất cả trạng thái</option>
                        <option value="PENDING">Chờ xác nhận</option>
                        <option value="CONFIRMED">Đã xác nhận</option>
                        <option value="SHIPPING">Đang vận chuyển</option>
                        <option value="COMPLETED">Hoàn thành</option>
                        <option value="CANCELLED">Đã hủy</option>
                    </select>

                    <select class="form-select form-select-sm w-auto" id="paymentStatusFilter">
                        <option value="">Tất cả thanh toán</option>
                        <option value="PAID">Đã thanh toán</option>
                        <option value="UNPAID">Chưa thanh toán</option>
                    </select>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Mã đơn</th>
                                    <th>Khách hàng</th>
                                    <th>Địa chỉ</th>
                                    <th>Trạng thái đơn</th>
                                    <th>Phương thức TT</th>
                                    <th>Trạng thái TT</th>
                                    <th>Tổng tiền</th>
                                    <th>Ngày đặt</th>
                                </tr>
                            </thead>
                            <tbody id="orderTableBody">
                                <tr>
                                    <td colspan="9" class="text-center text-muted py-4">Đang tải...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="d-flex justify-content-center mt-3 gap-1" id="paginationContainer"></div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/utils/admin-common.js"></script>
    <script src="../../js/pages/admin-order.js"></script>
</body>

</html>
