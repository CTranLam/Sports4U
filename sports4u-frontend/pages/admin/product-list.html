<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/layout.css">
    <title>Sports4U - Admin Danh sách sản phẩm</title>
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <aside class="col-lg-2 col-md-3 bg-dark text-white min-vh-100 p-3">
                <h5 class="fw-bold mb-4">ADMIN</h5>

                <ul class="nav flex-column gap-1">
                    <li>
                        <a class="nav-link text-white" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>

                    <li class="mt-3 fw-bold small">Quản lý</li>

                    <li>
                        <a class="nav-link text-white" href="users.html">
                            <i class="bi bi-people me-2"></i> Tài khoản
                        </a>
                    </li>

                    <li>
                        <a class="nav-link text-white active" data-bs-toggle="collapse" href="#sportMenu">
                            <i class="bi bi-tags me-2"></i> Sản phẩm
                        </a>

                        <div class="collapse show ps-3" id="sportMenu">
                            <a class="nav-link text-white-50" href="product-category.html">Danh mục sản phẩm</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=pickleball">Pickleball</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=badminton">Badminton</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=basketball">Basketball</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=tennis">Tennis</a>
                        </div>
                    </li>

                    <li>
                        <a class="nav-link text-white" href="orders.html">
                            <i class="bi bi-receipt me-2"></i> Đơn hàng
                        </a>
                    </li>
                </ul>

                <!-- LOGOUT BUTTON -->
                <hr class="bg-white my-4">
                <button id="logoutBtn" class="btn btn-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
                </button>
            </aside>

            <main class="col-lg-10 p-4">

                <div class="d-flex align-items-center gap-2 mb-3">
                    <a href="product-category.html" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-arrow-left me-2"></i> Quay lại
                    </a>
                    <h4 class="mb-0">Sản phẩm: <span id="categoryTitle"></span></h4>
                </div>

                <div class="d-flex justify-content-end mb-3">
                    <a href="product-form.html" class="btn btn-dark btn-sm">
                        <i class="bi bi-plus-lg"></i> Thêm sản phẩm
                    </a>
                </div>

                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Sản phẩm</th>
                            <th>Giá</th>
                            <th>Tồn kho</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>

                    <tbody id="productsTable">
                    </tbody>
                </table>

                <!-- PAGINATION -->
                <div class="d-flex justify-content-center mt-3 gap-1" id="paginationContainer">
                </div>

            </main>

        </div>
    </div>

    <script>
        // Sample data for products by category
        const categoryProducts = {
            pickleball: {
                name: 'Pickleball',
                products: [
                    { id: 1, name: 'ACEPRO ELITE PADDLE', image: '../../assets/products/paddle-1.jpg', price: '$249', stock: 20 },
                    { id: 2, name: 'VELOCITY CARBON', image: '../../assets/products/paddle-2.jpg', price: '$199', stock: 5 },
                    { id: 3, name: 'TITANIUM FLEX', image: '../../assets/products/paddle-3.jpg', price: '$299', stock: 0 }
                ]
            },
            badminton: {
                name: 'Badminton',
                products: [
                    { id: 4, name: 'BADMINTON RACKET PRO', image: '../../assets/products/paddle-1.jpg', price: '$89', stock: 25 },
                    { id: 5, name: 'SHUTTLE SET', image: '../../assets/products/paddle-2.jpg', price: '$45', stock: 40 }
                ]
            },
            basketball: {
                name: 'Basketball',
                products: [
                    { id: 6, name: 'BASKETBALL PRO', image: '../../assets/products/paddle-1.jpg', price: '$129', stock: 18 },
                    { id: 7, name: 'BASKETBALL SHOES', image: '../../assets/products/paddle-3.jpg', price: '$159', stock: 12 }
                ]
            },
            tennis: {
                name: 'Tennis',
                products: [
                    { id: 8, name: 'TENNIS RACKET', image: '../../assets/products/paddle-1.jpg', price: '$199', stock: 22 },
                    { id: 9, name: 'TENNIS BALL SET', image: '../../assets/products/paddle-2.jpg', price: '$25', stock: 50 }
                ]
            }
        };

        // Get category from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category');

        if (category && categoryProducts[category]) {
            const categoryData = categoryProducts[category];
            document.getElementById('categoryTitle').textContent = categoryData.name;

            const tbody = document.getElementById('productsTable');
            tbody.innerHTML = categoryData.products.map((product, idx) => `
                <tr>
                    <td>${idx + 1}</td>
                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <img src="${product.image}" class="rounded border" width="60"
                                height="60" style="object-fit: cover;">
                            <div>
                                <div class="fw-semibold">${product.name}</div>
                                <small class="text-muted">${categoryData.name}</small>
                            </div>
                        </div>
                    </td>
                    <td>${product.price}</td>
                    <td>${product.stock}</td>
                    <td class="text-end">
                        <a href="product-form.html?id=${product.id}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <button class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/utils/admin-common.js"></script>
    <script type="module" src="../../js/pages/admin-product-list.js"></script>
</body>

</html>
