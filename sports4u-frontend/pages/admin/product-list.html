<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/layout.css">
    <title>Sports4U - Admin Danh sách sản phẩm</title>
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row">

            <aside class="col-lg-2 col-md-3 bg-dark text-white min-vh-100 p-3">
                <h5 class="fw-bold mb-4">ADMIN</h5>
                <ul class="nav flex-column gap-1">
                    <li>
                        <a class="nav-link text-white" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="mt-3 fw-bold small">Quản lý</li>
                    <li>
                        <a class="nav-link text-white" href="users.html">
                            <i class="bi bi-people me-2"></i> Tài khoản
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white" href="product-category.html">
                            <i class="bi bi-tags me-2"></i> Danh mục sản phẩm
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white active" href="all-products.html">
                            <i class="bi bi-box-seam me-2"></i> Tất cả sản phẩm
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white" href="orders.html">
                            <i class="bi bi-receipt me-2"></i> Đơn hàng
                        </a>
                    </li>
                </ul>
                <hr class="bg-white my-4">
                <button id="logoutBtn" class="btn btn-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
                </button>
            </aside>

            <main class="col-lg-10 p-4">

                <div class="d-flex align-items-center gap-2 mb-3">
                    <a href="product-category.html" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-arrow-left me-2"></i> Quay lại
                    </a>
                    <h4 class="mb-0">Sản phẩm: <span id="categoryTitle">Đang tải...</span></h4>
                </div>

                <div class="d-flex justify-content-end mb-3">
                    <button class="btn btn-dark btn-sm" id="addProductBtn">
                        <i class="bi bi-plus-lg"></i> Thêm sản phẩm
                    </button>
                </div>

                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Sản phẩm</th>
                            <th>Giá</th>
                            <th>Tồn kho</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="productsTable">
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">Đang tải...</td>
                        </tr>
                    </tbody>
                </table>

                <div class="d-flex justify-content-center mt-3 gap-1" id="paginationContainer"></div>

            </main>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalTitle">Thêm sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editProductId">
                    <div class="mb-3">
                        <label class="form-label">Tên sản phẩm</label>
                        <input type="text" class="form-control" id="productName" placeholder="Nhập tên sản phẩm" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giá (VND)</label>
                        <input type="number" class="form-control" id="productPrice" placeholder="Nhập giá" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Số lượng</label>
                        <input type="number" class="form-control" id="productQuantity" placeholder="Nhập số lượng" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Xuất xứ</label>
                        <input type="text" class="form-control" id="productOrigin" placeholder="Nhập xuất xứ">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ưu điểm</label>
                        <input type="text" class="form-control" id="productAdvantages" placeholder="Nhập ưu điểm">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hình ảnh</label>
                        <input type="file" class="form-control" id="productImage" accept="image/*">
                        <img id="productImagePreview" src="" class="img-fluid mt-2 rounded d-none" style="max-height: 150px;">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" id="saveProductBtn">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal fade" id="deleteProductModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Xác nhận xóa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Bạn có chắc muốn xóa sản phẩm <strong id="deleteProductName"></strong> không?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteProductBtn">Xóa</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/utils/admin-common.js"></script>
    <script src="../../js/pages/admin-product-list.js"></script>
</body>

</html>
