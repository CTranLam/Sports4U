<!DOCTYPE html>

<head>

                    <li>
                        <a class="nav-link text-white active" href="dashboard.html">

                        </a>
                    </li>

                    <li class="mt-3 fw-bold small">Quản lý</li>

                    <li>
                        <a class="nav-link text-white" href="users.html">

                        </a>
                    </li>

                    <li>

                    <tbody>

                        <tr>

                            <td>
                                <div class="d-flex align-items-center gap-3">

                                        <div class="fw-semibold">ACEPRO ELITE PADDLE</div>

                                </div>

                            <td>$249</td>
                            <td>
                                20

                                </a>

                            <td>
                                5

                                <button class="btn btn-sm btn-outline-danger">

                                </button>

</html>
