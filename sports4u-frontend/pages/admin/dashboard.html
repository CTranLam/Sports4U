<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/layout.css">
    <title>Sports4U - Admin Dashboard</title>
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row">

            <aside class="col-lg-2 col-md-3 bg-dark text-white min-vh-100 p-3">
                <h5 class="fw-bold mb-4">ADMIN</h5>
                <ul class="nav flex-column gap-1">
                    <li>
                        <a class="nav-link text-white active" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="mt-3 fw-bold small">Quản lý</li>
                    <li>
                        <a class="nav-link text-white" href="users.html">
                            <i class="bi bi-people me-2"></i> Tài khoản
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white" href="product-category.html">
                            <i class="bi bi-tags me-2"></i> Danh mục sản phẩm
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white" href="all-products.html">
                            <i class="bi bi-box-seam me-2"></i> Tất cả sản phẩm
                        </a>
                    </li>
                    <li>
                        <a class="nav-link text-white" href="orders.html">
                            <i class="bi bi-receipt me-2"></i> Đơn hàng
                        </a>
                    </li>
                </ul>
                <hr class="bg-white my-4">
                <button id="logoutBtn" class="btn btn-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
                </button>
            </aside>

            <main class="col-lg-10 col-md-9 p-4">
                <h4 class="fw-semibold mb-4">Trang quản trị</h4>

                <!-- Summary Cards -->
                <div class="row g-3 mb-4">
                    <div class="col-sm-6 col-xl-4">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-3 bg-primary bg-opacity-10 p-3">
                                    <i class="bi bi-people fs-4 text-primary"></i>
                                </div>
                                <div>
                                    <p class="text-muted small mb-0">Tài khoản</p>
                                    <h4 class="fw-bold mb-0" id="statUsers">—</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-3 bg-warning bg-opacity-10 p-3">
                                    <i class="bi bi-box-seam fs-4 text-warning"></i>
                                </div>
                                <div>
                                    <p class="text-muted small mb-0">Sản phẩm</p>
                                    <h4 class="fw-bold mb-0" id="statProducts">—</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-3 bg-info bg-opacity-10 p-3">
                                    <i class="bi bi-receipt fs-4 text-info"></i>
                                </div>
                                <div>
                                    <p class="text-muted small mb-0">Đơn hàng</p>
                                    <h4 class="fw-bold mb-0" id="statOrders">—</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Charts row 1 -->
                <div class="row g-3 mb-3">
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="fw-bold mb-0">Doanh thu theo tháng</h6>
                                    <select class="form-select form-select-sm w-auto" id="yearSelect">
                                        <option value="2024">2024</option>
                                        <option value="2025">2025</option>
                                        <option value="2026">2026</option>
                                    </select>
                                </div>
                                <canvas id="revenueChart" height="120"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3">Tỉ lệ sản phẩm theo môn</h6>
                                <canvas id="categoryChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Charts row 2 -->
                <div class="row g-3">
                    <div class="col-12">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3">Đơn hàng 7 ngày gần nhất</h6>
                                <canvas id="orderChart" height="90"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../js/utils/admin-common.js"></script>
    <script src="../../js/pages/dashboard.js"></script>
</body>

</html>
