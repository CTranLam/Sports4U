<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/layout.css">

    <title>Sports4U - Admin Dashboard</title>
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row">

            <aside class="col-lg-2 col-md-3 bg-dark text-white min-vh-100 p-3">
                <h5 class="fw-bold mb-4">ADMIN</h5>

                <ul class="nav flex-column gap-1">
                    <li>
                        <a class="nav-link text-white active" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>

                    <li class="mt-3 fw-bold small">Quản lý</li>

                    <li>
                        <a class="nav-link text-white" href="users.html">
                            <i class="bi bi-people me-2"></i> Tài khoản
                        </a>
                    </li>

                    <li>
                        <a class="nav-link text-white" data-bs-toggle="collapse" href="#sportMenu">
                            <i class="bi bi-tags me-2"></i> Sản phẩm
                        </a>

                        <div class="collapse show ps-3" id="sportMenu">
                            <a class="nav-link text-white-50" href="product-category.html">Danh mục sản phẩm</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=pickleball">Pickleball</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=badminton">Badminton</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=basketball">Basketball</a>
                            <a class="nav-link text-white-50" href="product-list.html?category=tennis">Tennis</a>
                        </div>
                    </li>

                    <li>
                        <a class="nav-link text-white" href="orders.html">
                            <i class="bi bi-receipt me-2"></i> Đơn hàng
                        </a>
                    </li>
                </ul>

                <!-- LOGOUT BUTTON -->
                <hr class="bg-white my-4">
                <button id="logoutBtn" class="btn btn-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
                </button>
            </aside>

            <main class="col-lg-10 col-md-9 p-4">
                <h3 class="mb-4">Trang quản trị</h3>
                <div class="row g-4">
                    <div class="col-md-3">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <p class="text-muted mb-1">Tài khoản</p>
                                <h3>120</h3>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <p class="text-muted mb-1">Sản phẩm</p>
                                <h3>86</h3>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <p class="text-muted mb-1">Đơn hàng</p>
                                <h3>42</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mt-4">
                    <div class="col-lg-8">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3">Doanh thu theo tháng</h6>
                                <canvas id="revenueChart" height="120"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3">Tỉ lệ sản phẩm theo môn</h6>
                                <canvas id="categoryChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mt-1">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3">Đơn hàng 7 ngày gần nhất</h6>
                                <canvas id="orderChart" height="100"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../js/utils/admin-common.js"></script>
    <script src="../../js/pages/dashboard.js"></script>

</body>

</html>
